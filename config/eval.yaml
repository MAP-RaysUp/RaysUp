defaults:
  - base
  - dataset_evaluation: voc
  - _self_

# Evaluation settings
eval:
  task: "seg"  
  model_ckpt: null
  upsampler_name: ${model.name}
  external_repo_path: null
  jafarmain_repo_path: null
  anyup_repo_path: null
  featup_repo_path: null
  loftup_repo_path: null
  use_natten: true
  da3_size: large
  da3_name: null

num_epochs: 20

optimizer: 
  lr: 5e-4

train_dataloader:
  batch_size: 2

val_dataloader:
  batch_size: 1

img_size: 448
target_size: ${img_size}

# Metrics settings
metrics:
  seg:
    num_classes: ${dataset_evaluation.num_classes}
  depth:
    min_depth: 1e-3
    max_depth: 10

sanity: false 
